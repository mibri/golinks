<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoSlash</title>
  <style>
    /* ---- Constants ---- */
    :root {
      --radius: 6px;
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
              Helvetica, "Apple Color Emoji", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    /* ---- Light theme (default) ---- */
    /* Warm off-white body with pure-white cards layered on top — softens the
       otherwise harsh flat-white popup edge. */
    :root, :root[data-theme="light"] {
      --ink:        #37352f;
      --ink-soft:   #787774;
      --ink-faint:  #9b9a97;
      --line:       rgba(55, 53, 47, 0.09);
      --line-2:     rgba(55, 53, 47, 0.16);
      --hover:      rgba(55, 53, 47, 0.05);
      --bg:         #f7f7f5;
      --field:      #ffffff;
      --accent:     #2383e2;
      --accent-bg:  rgba(35, 131, 226, 0.08);
    }

    /* ---- Dark theme (explicit) ---- */
    :root[data-theme="dark"] {
      --ink:       #e9e9e7;
      --ink-soft:  #9b9a97;
      --ink-faint: #6f6f6c;
      --line:      rgba(255, 255, 255, 0.10);
      --line-2:    rgba(255, 255, 255, 0.18);
      --hover:     rgba(255, 255, 255, 0.055);
      --bg:        #1f1f1f;
      --field:     #2a2a2a;
      --accent:    #5b9be8;
      --accent-bg: rgba(91, 155, 232, 0.14);
    }

    /* ---- Dark theme (when following the system) ---- */
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        --ink:       #e9e9e7;
        --ink-soft:  #9b9a97;
        --ink-faint: #6f6f6c;
        --line:      rgba(255, 255, 255, 0.10);
        --line-2:    rgba(255, 255, 255, 0.18);
        --hover:     rgba(255, 255, 255, 0.055);
        --bg:        #1f1f1f;
        --field:     #2a2a2a;
        --accent:    #5b9be8;
        --accent-bg: rgba(91, 155, 232, 0.14);
      }
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 320px;
      background: var(--bg); color: var(--ink);
      font-family: var(--font); font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { padding: 14px 14px 13px; }

    /* ---- Header ---- */
    .head { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; }
    .mark {
      width: 20px; height: 20px; border-radius: 5px; background: var(--ink);
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    .title { font-weight: 600; letter-spacing: -0.01em; }
    .head .spacer { flex: 1; }
    .manage {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font); font-size: 12px; font-weight: 500;
      color: var(--ink-soft); background: none; border: none; cursor: pointer;
      padding: 4px 6px; border-radius: 5px;
    }
    .manage:hover { background: var(--hover); color: var(--ink); }
    .manage svg { color: var(--ink-faint); }

    /* ---- Current page card ---- */
    .page {
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 9px 10px; margin-bottom: 14px; background: var(--field);
    }
    .page-row { display: flex; align-items: center; gap: 8px; }
    .fav {
      width: 16px; height: 16px; border-radius: 4px; flex: 0 0 auto;
      background: var(--hover); object-fit: contain;
    }
    .page-text { min-width: 0; flex: 1; }
    .page-title {
      font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* URL doubles as an inline editable field: reads as muted text, reveals a
       border on hover/focus so you can tweak what gets saved. */
    .page-url {
      width: 100%; margin-top: 2px; padding: 1px 4px; margin-left: -4px;
      font-family: var(--font); font-size: 12px; color: var(--ink-faint);
      border: 1px solid transparent; border-radius: 4px; background: transparent;
      outline: none; text-overflow: ellipsis;
      transition: border-color .12s ease, color .12s ease, background .12s ease;
    }
    .page-url:hover { border-color: var(--line-2); }
    .page-url:focus { color: var(--ink); border-color: var(--accent); background: var(--bg); }

    /* ---- Alias field ---- */
    .label {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--ink-faint); margin: 0 2px 6px;
    }
    .field-row { display: flex; align-items: stretch; gap: 6px; }
    .prefix {
      display: flex; align-items: center; padding: 0 9px;
      font-family: var(--mono); font-size: 13px; color: var(--ink-soft);
      border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--hover); user-select: none;
    }
    input[type="text"] {
      flex: 1; width: 100%; font-family: var(--font); font-size: 14px;
      color: var(--ink); padding: 8px 10px;
      border: 1px solid var(--line-2); border-radius: var(--radius);
      background: var(--field); outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    input[type="text"]::placeholder { color: var(--ink-faint); }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

    /* ---- Live mapping line ---- */
    .map {
      margin: 9px 2px 0; font-size: 12.5px; color: var(--ink-faint);
      line-height: 1.45; word-break: break-word; min-height: 17px;
    }
    .map .code {
      font-family: var(--mono); font-size: 12px; color: var(--ink);
      background: var(--hover); padding: 1px 5px; border-radius: 4px;
    }
    .map .arrow { color: var(--ink-faint); margin: 0 2px; }
    .map .star { color: var(--accent); font-weight: 600; }

    /* ---- Footer ---- */
    .foot { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .hint { font-size: 12px; color: var(--ink-faint); flex: 1; }
    .hint kbd {
      font-family: var(--font); font-size: 11px;
      border: 1px solid var(--line-2); border-bottom-width: 2px;
      border-radius: 4px; padding: 0 4px; color: var(--ink-soft);
    }
    .btn {
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: #fff; background: var(--accent); border: none;
      border-radius: var(--radius); padding: 7px 14px; cursor: pointer;
      transition: filter .12s ease;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: .45; cursor: default; filter: none; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; left: 0; right: 0; bottom: 0;
      transform: translateY(100%); transition: transform .18s ease;
      background: var(--ink); color: var(--bg);
      font-size: 12.5px; font-weight: 500; padding: 9px 14px;
      display: flex; align-items: center; gap: 7px;
    }
    .toast.show { transform: translateY(0); }
    .toast svg { flex: 0 0 auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <span class="mark" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8.5 2.5 L3.5 9.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="title">GoSlash</span>
      <span class="spacer"></span>
      <button id="openOptions" class="manage" title="Manage all shortcuts">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 3.5h7M2 7h10M2 10.5h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="11" cy="3.5" r="1.4" fill="currentColor"/>
          <circle cx="9.5" cy="10.5" r="1.4" fill="currentColor"/>
        </svg>
        Manage
      </button>
    </div>

    <div class="page">
      <div class="page-row">
        <img id="fav" class="fav" alt="" />
        <div class="page-text">
          <div id="pageTitle" class="page-title">Loading…</div>
          <input id="pageUrl" class="page-url" type="text" spellcheck="false"
                 autocomplete="off" autocapitalize="off" aria-label="URL to save" />
        </div>
      </div>
    </div>

    <div class="label">Give it a short alias</div>
    <div class="field-row">
      <span class="prefix">go</span>
      <input id="alias" type="text" placeholder="cal"
             autocomplete="off" autocapitalize="off" spellcheck="false" autofocus />
    </div>

    <div id="map" class="map"></div>

    <div class="foot">
      <div class="hint">Press <kbd>Enter</kbd> to save</div>
      <button id="save" class="btn" disabled>Save shortcut</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M11.5 4 5.8 9.7 2.5 6.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="toastMsg">Saved</span>
  </div>

  <script src="lib/store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
