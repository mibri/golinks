<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoSlash</title>
  <style>
    /* ---- Notion-inspired palette ---- */
    :root {
      --ink:        #37352f;
      --ink-soft:   #787774;
      --ink-faint:  #9b9a97;
      --line:       rgba(55, 53, 47, 0.09);
      --line-2:     rgba(55, 53, 47, 0.16);
      --hover:      rgba(55, 53, 47, 0.06);
      --bg:         #ffffff;
      --field:      #ffffff;
      --accent:     #2383e2;
      --accent-bg:  rgba(35, 131, 226, 0.08);
      --good:       #448361;
      --radius:     6px;
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
              Helvetica, "Apple Color Emoji", Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink:       #e9e9e7;
        --ink-soft:  #9b9a97;
        --ink-faint: #6f6f6c;
        --line:      rgba(255, 255, 255, 0.10);
        --line-2:    rgba(255, 255, 255, 0.18);
        --hover:     rgba(255, 255, 255, 0.055);
        --bg:        #1f1f1f;
        --field:     #2a2a2a;
        --accent:    #5b9be8;
        --accent-bg: rgba(91, 155, 232, 0.14);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { padding: 14px 14px 12px; }

    /* ---- Header ---- */
    .head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mark {
      width: 20px; height: 20px; border-radius: 5px;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }
    .mark svg { display: block; }
    .title { font-weight: 600; letter-spacing: -0.01em; }
    .head .spacer { flex: 1; }
    .icon-btn {
      border: none; background: none; cursor: pointer;
      color: var(--ink-faint); padding: 4px; border-radius: 5px;
      display: flex; line-height: 0;
    }
    .icon-btn:hover { background: var(--hover); color: var(--ink-soft); }

    /* ---- Current page card ---- */
    .page {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 10px;
      margin-bottom: 12px;
      background: var(--field);
    }
    .page-title {
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .page-url {
      color: var(--ink-faint);
      font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ---- Alias field ---- */
    .label {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--ink-faint);
      margin: 0 2px 6px;
    }
    .field-row { display: flex; align-items: stretch; gap: 6px; }
    .prefix {
      display: flex; align-items: center;
      padding: 0 8px;
      font-size: 13px; color: var(--ink-faint);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--hover);
      user-select: none;
    }
    input[type="text"] {
      flex: 1; width: 100%;
      font-family: var(--font); font-size: 14px;
      color: var(--ink);
      padding: 8px 10px;
      border: 1px solid var(--line-2);
      border-radius: var(--radius);
      background: var(--field);
      outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    input[type="text"]::placeholder { color: var(--ink-faint); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    /* ---- Wildcard preview ---- */
    .preview {
      display: none;
      margin: 8px 2px 0;
      font-size: 12px;
      color: var(--ink-soft);
      line-height: 1.4;
      word-break: break-all;
    }
    .preview.show { display: block; }
    .preview code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11.5px;
      background: var(--hover);
      padding: 1px 4px; border-radius: 4px;
      color: var(--ink);
    }
    .preview .star { color: var(--accent); font-weight: 600; }

    /* ---- Footer ---- */
    .foot {
      display: flex; align-items: center; gap: 8px;
      margin-top: 12px;
    }
    .hint { font-size: 12px; color: var(--ink-faint); flex: 1; }
    .hint kbd {
      font-family: var(--font); font-size: 11px;
      border: 1px solid var(--line-2); border-bottom-width: 2px;
      border-radius: 4px; padding: 0 4px; color: var(--ink-soft);
    }
    .btn {
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: #fff; background: var(--accent);
      border: none; border-radius: var(--radius);
      padding: 7px 14px; cursor: pointer;
      transition: filter .12s ease;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: .5; cursor: default; filter: none; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; left: 0; right: 0; bottom: 0;
      transform: translateY(100%);
      transition: transform .18s ease;
      background: var(--ink); color: var(--bg);
      font-size: 12.5px; font-weight: 500;
      padding: 9px 14px;
      display: flex; align-items: center; gap: 7px;
    }
    .toast.show { transform: translateY(0); }
    .toast svg { flex: 0 0 auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <span class="mark" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8.5 2.5 L3.5 9.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="title">GoSlash</span>
      <span class="spacer"></span>
      <button id="openOptions" class="icon-btn" title="Open dashboard" aria-label="Open dashboard">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 10.2a2.2 2.2 0 1 0 0-4.4 2.2 2.2 0 0 0 0 4.4Z" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 1.5v1.7M8 12.8v1.7M14.5 8h-1.7M3.2 8H1.5M12.6 3.4l-1.2 1.2M4.6 11.4l-1.2 1.2M12.6 12.6l-1.2-1.2M4.6 4.6 3.4 3.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="page">
      <div id="pageTitle" class="page-title">Loading…</div>
      <div id="pageUrl" class="page-url"></div>
    </div>

    <div class="label">Shortcut alias</div>
    <div class="field-row">
      <span class="prefix">go</span>
      <input id="alias" type="text" placeholder="cal  ·  gh/{*}  ·  team/wiki"
             autocomplete="off" autocapitalize="off" spellcheck="false" autofocus />
    </div>

    <div id="preview" class="preview"></div>

    <div class="foot">
      <div class="hint">Press <kbd>Enter</kbd> to save</div>
      <button id="save" class="btn" disabled>Save</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M11.5 4 5.8 9.7 2.5 6.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="toastMsg">Saved</span>
  </div>

  <script src="lib/store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
