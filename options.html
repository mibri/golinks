<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoSlash — Dashboard</title>
  <style>
    :root {
      --ink:        #37352f;
      --ink-soft:   #787774;
      --ink-faint:  #9b9a97;
      --line:       rgba(55, 53, 47, 0.10);
      --line-2:     rgba(55, 53, 47, 0.16);
      --hover:      rgba(55, 53, 47, 0.045);
      --bg:         #ffffff;
      --panel:      #fbfbfa;
      --field:      #ffffff;
      --accent:     #2383e2;
      --accent-bg:  rgba(35, 131, 226, 0.08);
      --danger:     #c4554d;
      --danger-bg:  rgba(196, 85, 77, 0.08);
      --radius:     6px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
              Helvetica, "Apple Color Emoji", Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink:       #e9e9e7;
        --ink-soft:  #9b9a97;
        --ink-faint: #6f6f6c;
        --line:      rgba(255, 255, 255, 0.10);
        --line-2:    rgba(255, 255, 255, 0.18);
        --hover:     rgba(255, 255, 255, 0.05);
        --bg:        #191919;
        --panel:     #202020;
        --field:     #2a2a2a;
        --accent:    #5b9be8;
        --accent-bg: rgba(91, 155, 232, 0.14);
        --danger:    #e0928c;
        --danger-bg: rgba(224, 146, 140, 0.12);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--font); font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ---- Header ---- */
    header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .mark {
      width: 30px; height: 30px; border-radius: 7px; background: var(--ink);
      display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    h1 { font-size: 20px; font-weight: 650; letter-spacing: -0.02em; margin: 0; }
    .subtitle { color: var(--ink-faint); font-size: 13px; margin: 0 0 28px 42px; }

    /* ---- Toolbar ---- */
    .toolbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .btn {
      font-family: var(--font); font-size: 13px; font-weight: 500;
      border: 1px solid var(--line-2); border-radius: var(--radius);
      background: var(--field); color: var(--ink);
      padding: 7px 12px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .12s ease, border-color .12s ease;
    }
    .btn:hover { background: var(--hover); }
    .btn svg { color: var(--ink-soft); }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn.primary:hover { filter: brightness(1.05); background: var(--accent); }
    .btn.primary svg { color: #fff; }
    .btn.danger { color: var(--danger); border-color: var(--line-2); }
    .btn.danger:hover { background: var(--danger-bg); }
    .btn.ghost { border-color: transparent; background: none; }
    .btn.ghost:hover { background: var(--hover); }
    .toolbar .spacer { flex: 1; }
    .count { font-size: 12px; color: var(--ink-faint); align-self: center; }

    /* ---- List ---- */
    .list { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid var(--line);
      transition: background .1s ease;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--hover); }
    .row-main { flex: 1; min-width: 0; }
    .alias {
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .alias .go { color: var(--ink-faint); font-weight: 500; }
    .alias .star { color: var(--accent); }
    .target {
      font-size: 12.5px; color: var(--ink-faint);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .badges { display: flex; gap: 5px; align-items: center; flex: 0 0 auto; }
    .tag {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em; padding: 2px 6px; border-radius: 4px;
      background: var(--hover); color: var(--ink-soft);
    }
    .tag.bundle { background: var(--accent-bg); color: var(--accent); }
    .row-actions { display: flex; gap: 2px; flex: 0 0 auto; }
    .icon-btn {
      border: none; background: none; cursor: pointer; color: var(--ink-faint);
      padding: 6px; border-radius: 5px; display: flex; line-height: 0;
    }
    .icon-btn:hover { background: var(--line); color: var(--ink); }
    .icon-btn.del:hover { background: var(--danger-bg); color: var(--danger); }

    .empty {
      text-align: center; color: var(--ink-faint); font-size: 13px;
      padding: 48px 20px;
    }
    .empty strong { color: var(--ink-soft); display: block; margin-bottom: 4px; font-size: 14px; }

    /* ---- Raw JSON section ---- */
    .section-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--ink-faint);
      margin: 36px 0 10px;
    }
    textarea#raw {
      width: 100%; min-height: 240px; resize: vertical;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.6;
      color: var(--ink); background: var(--panel);
      border: 1px solid var(--line-2); border-radius: 8px;
      padding: 14px; outline: none;
      tab-size: 2;
    }
    textarea#raw:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .raw-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .raw-msg { font-size: 12.5px; flex: 1; }
    .raw-msg.err { color: var(--danger); }
    .raw-msg.ok { color: var(--accent); }

    /* ---- Modal ---- */
    .overlay {
      position: fixed; inset: 0; background: rgba(15, 15, 15, 0.45);
      display: none; align-items: flex-start; justify-content: center;
      padding: 60px 20px; overflow-y: auto; z-index: 50;
    }
    .overlay.show { display: flex; }
    .modal {
      width: 100%; max-width: 480px; background: var(--bg);
      border: 1px solid var(--line-2); border-radius: 10px;
      box-shadow: 0 12px 40px rgba(15, 15, 15, 0.22);
      padding: 22px;
    }
    .modal h2 { font-size: 16px; font-weight: 650; margin: 0 0 18px; letter-spacing: -0.01em; }
    .fld { margin-bottom: 14px; }
    .fld label {
      display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft);
      margin-bottom: 5px;
    }
    .fld .desc { font-size: 11.5px; color: var(--ink-faint); margin: 4px 0 0; }
    input[type="text"], textarea, select {
      width: 100%; font-family: var(--font); font-size: 13.5px; color: var(--ink);
      background: var(--field); border: 1px solid var(--line-2);
      border-radius: var(--radius); padding: 8px 10px; outline: none;
    }
    input.mono { font-family: var(--mono); font-size: 12.5px; }
    textarea { font-family: var(--mono); font-size: 12.5px; line-height: 1.6; resize: vertical; min-height: 76px; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg);
    }
    /* segmented type toggle */
    .seg { display: inline-flex; border: 1px solid var(--line-2); border-radius: var(--radius); overflow: hidden; }
    .seg button {
      font-family: var(--font); font-size: 13px; font-weight: 500;
      border: none; background: var(--field); color: var(--ink-soft);
      padding: 7px 16px; cursor: pointer;
    }
    .seg button.active { background: var(--accent); color: #fff; }
    .seg button + button { border-left: 1px solid var(--line-2); }

    .overrides .ov-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .overrides .ov-row input { flex: 1; }
    .overrides .ov-row .icon-btn { flex: 0 0 auto; }
    .check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
    .check input { width: auto; }
    .grp-extra { display: none; margin-top: 12px; padding-left: 24px; }
    .grp-extra.show { display: block; }

    .modal-foot { display: flex; gap: 8px; margin-top: 22px; }
    .modal-foot .spacer { flex: 1; }
    .modal-err { color: var(--danger); font-size: 12.5px; margin-top: 12px; min-height: 16px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="mark" aria-hidden="true">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
          <path d="M12 4 L5 13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <h1>GoSlash</h1>
    </header>
    <p class="subtitle">Local-first shortlinks · everything is stored in this browser only.</p>

    <div class="toolbar">
      <button id="newBtn" class="btn primary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2.5v9M2.5 7h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        New shortcut
      </button>
      <span class="spacer"></span>
      <button id="importBtn" class="btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5v7M4 5.5 7 8.5l3-3M2 10.5v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Import Config
      </button>
      <button id="exportBtn" class="btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 9V2M4 5 7 2l3 3M2 10.5v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export Config
      </button>
      <input id="importFile" type="file" accept="application/json,.json" class="hidden" />
    </div>

    <div id="list" class="list"></div>

    <div class="section-title">Raw JSON</div>
    <textarea id="raw" spellcheck="false" autocapitalize="off"></textarea>
    <div class="raw-foot">
      <span id="rawMsg" class="raw-msg"></span>
      <button id="rawFormat" class="btn ghost">Format</button>
      <button id="rawRevert" class="btn ghost">Revert</button>
      <button id="rawSave" class="btn primary">Save JSON</button>
    </div>
  </div>

  <!-- ---- Editor modal ---- -->
  <div id="overlay" class="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h2 id="modalTitle">New shortcut</h2>

      <div class="fld">
        <label>Type</label>
        <div class="seg" id="typeSeg">
          <button type="button" data-type="single" class="active">Single</button>
          <button type="button" data-type="bundle">Bundle</button>
        </div>
      </div>

      <div class="fld">
        <label for="mAlias">Alias</label>
        <input id="mAlias" class="mono" type="text" placeholder="cal  ·  gh/{*}  ·  team/wiki"
               autocomplete="off" spellcheck="false" />
        <p class="desc">Use <code>{*}</code> for a wildcard parameter, e.g. <code>gh/{*}</code>.</p>
      </div>

      <!-- Single fields -->
      <div id="singleFields">
        <div class="fld">
          <label for="mTarget">Target URL</label>
          <input id="mTarget" class="mono" type="text" placeholder="https://example.com/{*}"
                 autocomplete="off" spellcheck="false" />
        </div>
        <div class="fld">
          <label>Domain overrides <span style="color:var(--ink-faint);font-weight:400">(optional)</span></label>
          <div id="overrides" class="overrides"></div>
          <button type="button" id="addOverride" class="btn ghost" style="margin-top:4px;font-size:12px;padding:5px 8px;">
            + Add override
          </button>
          <p class="desc">If the active tab's domain matches, route there instead.</p>
        </div>
      </div>

      <!-- Bundle fields -->
      <div id="bundleFields" class="hidden">
        <div class="fld">
          <label for="mTargets">Targets — one URL per line</label>
          <textarea id="mTargets" placeholder="https://mail.google.com&#10;https://calendar.google.com"></textarea>
        </div>
        <div class="fld">
          <label class="check"><input id="mUseGroup" type="checkbox" /> Wrap in a colored Tab Group</label>
          <div id="grpExtra" class="grp-extra">
            <div class="fld">
              <label for="mGroupName">Group name</label>
              <input id="mGroupName" type="text" placeholder="Morning" autocomplete="off" />
            </div>
            <div class="fld" style="margin-bottom:0">
              <label for="mGroupColor">Group color</label>
              <select id="mGroupColor">
                <option value="grey">Grey</option>
                <option value="blue" selected>Blue</option>
                <option value="red">Red</option>
                <option value="yellow">Yellow</option>
                <option value="green">Green</option>
                <option value="pink">Pink</option>
                <option value="purple">Purple</option>
                <option value="cyan">Cyan</option>
                <option value="orange">Orange</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="modalErr" class="modal-err"></div>

      <div class="modal-foot">
        <button id="modalCancel" class="btn ghost">Cancel</button>
        <span class="spacer"></span>
        <button id="modalSave" class="btn primary">Save shortcut</button>
      </div>
    </div>
  </div>

  <script src="lib/store.js"></script>
  <script src="options.js"></script>
</body>
</html>
