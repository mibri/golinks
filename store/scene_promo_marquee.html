<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root{--ink:#37352f;--soft:#787774;--faint:#9b9a97;--line:rgba(55,53,47,.10);--accent:#2383e2;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  *{box-sizing:border-box}
  html,body{margin:0;width:1400px;height:560px;overflow:hidden;
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .scene{position:relative;width:1400px;height:560px;display:flex;align-items:center;
    background:linear-gradient(120deg,#e9ecf2 0%,#f4f2ef 55%,#f1ede8 100%);}
  .scene::before{content:"";position:absolute;width:780px;height:780px;right:-160px;top:-180px;border-radius:50%;
    background:radial-gradient(circle,rgba(35,131,226,.12),transparent 68%);}

  .left{position:relative;width:640px;padding:0 0 0 84px;}
  .brand{display:flex;align-items:center;gap:13px;margin-bottom:26px;}
  .mark{width:46px;height:46px;border-radius:12px;background:var(--ink);display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 26px -10px rgba(20,20,30,.45);}
  .brand .bn{font-size:26px;font-weight:680;letter-spacing:-.02em;color:var(--ink);}
  h1{font-size:50px;line-height:1.08;font-weight:680;letter-spacing:-.03em;color:var(--ink);margin:0 0 16px;}
  h1 .go{color:var(--accent);}
  p{font-size:21px;line-height:1.5;color:var(--soft);margin:0;max-width:520px;}

  .right{position:relative;flex:1;display:flex;align-items:center;justify-content:center;}
  .omni{width:520px;}
  .bar{height:48px;background:#fff;border:1px solid #c9cdd3;border-radius:24px;display:flex;align-items:center;
    padding:0 20px;gap:11px;font-size:18px;color:var(--ink);box-shadow:0 18px 40px -16px rgba(20,20,30,.30);}
  .bar .key{font-family:var(--mono);background:rgba(35,131,226,.12);color:var(--accent);font-size:15px;font-weight:600;padding:3px 11px;border-radius:7px;}
  .bar .cursor{width:2px;height:22px;background:var(--accent);}
  .drop{margin-top:10px;background:#fff;border:1px solid #e6e7ea;border-radius:14px;overflow:hidden;padding:6px 0;
    box-shadow:0 26px 56px -20px rgba(20,20,30,.34);}
  .sug{display:flex;align-items:center;gap:13px;padding:12px 20px;font-size:15.5px;}
  .sug.sel{background:rgba(35,131,226,.08);}
  .sug .ico{color:var(--faint);font-size:14px;width:16px;text-align:center;}
  .sug .a{font-family:var(--mono);font-weight:600;color:var(--ink);}
  .sug .a .star{color:var(--accent);}
  .sug .dash{color:var(--faint);margin:0 3px;}
  .sug .u{color:var(--soft);}
  .sug .pill{margin-left:auto;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--soft);background:rgba(55,53,47,.06);padding:3px 9px;border-radius:5px;}
  .sug .pill.b{color:var(--accent);background:rgba(35,131,226,.10);}
</style>
</head>
<body>
  <div class="scene">
    <div class="left">
      <div class="brand">
        <span class="mark"><svg width="24" height="24" viewBox="0 0 17 17" fill="none"><path d="M12 4 L5 13" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg></span>
        <span class="bn">GoSlash</span>
      </div>
      <h1>Type <span class="go">go</span>,<br>jump anywhere.</h1>
      <p>Custom address-bar shortcuts for links, wildcards, and tab bundles — synced across your Chrome browsers.</p>
    </div>
    <div class="right">
      <div class="omni">
        <div class="bar"><span class="key">go</span><span>cal</span><span class="cursor"></span></div>
        <div class="drop">
          <div class="sug sel"><span class="ico">↵</span><span><span class="a">cal</span> <span class="dash">—</span> <span class="u">calendar.google.com</span></span><span class="pill">Link</span></div>
          <div class="sug"><span class="ico">↵</span><span><span class="a">catchup</span> <span class="dash">—</span> <span class="u">bundle · 3 tabs</span></span><span class="pill b">Bundle</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
