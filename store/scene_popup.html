<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --ink:#37352f; --soft:#787774; --faint:#9b9a97;
    --line:rgba(55,53,47,.09); --line2:rgba(55,53,47,.16); --hover:rgba(55,53,47,.05);
    --bg:#f7f7f5; --field:#fff; --accent:#2383e2; --accentbg:rgba(35,131,226,.08);
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1280px;height:800px;overflow:hidden;
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .scene{position:relative;width:1280px;height:800px;display:flex;flex-direction:column;
    background:linear-gradient(135deg,#eef0f4 0%,#f6f4f1 60%,#f1efea 100%);}
  .scene::before{content:"";position:absolute;width:760px;height:760px;right:-160px;top:-220px;
    border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(35,131,226,.10),transparent 70%);}
  .copy{position:relative;padding:72px 88px 0;}
  .copy h1{font-size:42px;font-weight:680;letter-spacing:-.025em;color:var(--ink);margin:0 0 12px;}
  .copy p{font-size:19px;color:var(--soft);margin:0;max-width:760px;line-height:1.5;}
  .stage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;}
  .device{transform:scale(1.5);transform-origin:center;}

  .popup{width:340px;background:var(--bg);border-radius:14px;overflow:hidden;
    box-shadow:0 34px 70px -24px rgba(20,20,30,.40),0 0 0 1px rgba(55,53,47,.06);}
  .wrap{padding:16px 16px 15px;}
  .head{display:flex;align-items:center;gap:8px;margin-bottom:13px;}
  .mark{width:22px;height:22px;border-radius:6px;background:var(--ink);display:flex;align-items:center;justify-content:center;}
  .title{font-weight:600;letter-spacing:-.01em;font-size:15px;}
  .spacer{flex:1;}
  .manage{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--soft);}
  .manage svg{color:var(--faint);}
  .page{border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:14px;background:var(--field);}
  .page-row{display:flex;align-items:center;gap:13px;}
  .fav{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;}
  .page-text{min-width:0;flex:1;}
  .page-title{font-weight:500;font-size:14px;line-height:1.35;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .page-url{font-size:12px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin:0 2px 6px;}
  .field-row{display:flex;align-items:stretch;gap:6px;}
  .prefix{display:flex;align-items:center;padding:0 9px;font-family:var(--mono);font-size:13px;color:var(--soft);
    border:1px solid var(--line);border-radius:6px;background:var(--hover);}
  .input{flex:1;display:flex;align-items:center;font-size:14px;color:var(--ink);padding:8px 10px;
    border:1px solid var(--accent);border-radius:6px;background:var(--field);box-shadow:0 0 0 3px var(--accentbg);}
  .caret{width:1.5px;height:15px;background:var(--accent);margin-left:1px;}
  .map{margin:9px 2px 0;font-size:12.5px;color:var(--faint);line-height:1.45;}
  .map .code{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--hover);padding:1px 5px;border-radius:4px;}
  .map .arrow{margin:0 3px;}
  .foot{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .hint{font-size:12px;color:var(--faint);flex:1;}
  .hint kbd{font-size:11px;border:1px solid var(--line2);border-bottom-width:2px;border-radius:4px;padding:0 4px;color:var(--soft);}
  .btn{font-size:13px;font-weight:500;color:#fff;background:var(--accent);border-radius:6px;padding:7px 14px;}
</style>
</head>
<body>
  <div class="scene">
    <div class="copy">
      <h1>Save any page as a shortcut</h1>
      <p>One click captures the current tab. Give it a short alias and reach it anytime from the address bar.</p>
    </div>
    <div class="stage">
      <div class="device">
        <div class="popup">
          <div class="wrap">
            <div class="head">
              <span class="mark"><svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M8.5 2.5 L3.5 9.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></span>
              <span class="title">GoSlash</span>
              <span class="spacer"></span>
              <span class="manage"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h7M2 7h10M2 10.5h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="11" cy="3.5" r="1.4" fill="currentColor"/><circle cx="9.5" cy="10.5" r="1.4" fill="currentColor"/></svg>Manage</span>
            </div>
            <div class="page">
              <div class="page-row">
                <span class="fav">📅</span>
                <div class="page-text">
                  <div class="page-title">Google Calendar</div>
                  <div class="page-url">calendar.google.com/calendar/u/0/r</div>
                </div>
              </div>
            </div>
            <div class="label">Give it a short alias</div>
            <div class="field-row">
              <span class="prefix">go</span>
              <span class="input">cal<span class="caret"></span></span>
            </div>
            <div class="map"><span class="code">go cal</span><span class="arrow">→</span>opens this page</div>
            <div class="foot">
              <span class="hint">Press <kbd>Enter</kbd> to save</span>
              <span class="btn">Save shortcut</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
